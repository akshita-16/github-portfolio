<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial;
background: #0f172a;
color: white;
}

/* SECTIONS /
.section {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

/ COMMON BOX /
.box {
width: 85%;
height: 80%;
border: 1px solid white;
border-radius: 20px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
}

/ HEADINGS /
.heading {
position: absolute;
top: 20px;
font-size: 22px;
}

/ HERO /
.hero {
display: flex;
align-items: center;
gap: 50px;
}

.avatar {
width: 120px;
height: 120px;
background: #1e293b;
border-radius: 50%;
}

/ EXPERIENCE /
.exp-container {
width: 80%;
height: 70%;
position: relative;
}

.line {
position: absolute;
left: 50%;
width: 4px;
height: 100%;
background: white;
transform: translateX(-50%);
}

.exp-box {
width: 35%;
padding: 10px;
background: #1e293b;
border-radius: 8px;
position: absolute;
}

.left { left: 0; }
.right { right: 0; }

.e1 { bottom: 0; }
.e2 { bottom: 25%; }
.e3 { bottom: 50%; }
.e4 { bottom: 75%; }

/ SKILLS /
.skills {
width: 100%;
height: 100%;
position: relative;
}

.bubble {
width: 60px;
height: 60px;
background: #1e293b;
border-radius: 50%;
position: absolute;
display: flex;
justify-content: center;
align-items: center;
font-size: 10px;
}

/ WORK /
.work {
display: flex;
gap: 20px;
}

.card {
width: 120px;
height: 120px;
background: #1e293b;
border-radius: 10px;
display: flex;
justify-content: center;
align-items: center;
}

/ CONTACT */
.contact {
text-align: center;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section">
<div class="box">
<div class="hero">
<div>Akshita Tyagi</div>
<div class="avatar"></div>
<div>Salesforce Developer</div>
</div>
</div>
</div>

<!-- EXPERIENCE -->
<div class="section">
<div class="box">
<div class="heading">My Experience</div>

<div class="exp-container">
<div class="line"></div>

<div class="exp-box left e1">Trainee (2021)</div>
<div class="exp-box right e2">Programmer Analyst (2022)</div>
<div class="exp-box left e3">Associate (2023)</div>
<div class="exp-box right e4">Accenture (2024)</div>

</div>
</div>
</div>

<!-- SKILLS -->
<div class="section">
<div class="box">
<div class="heading">My Skills</div>

<div class="skills">
<div class="bubble" style="top:10%;left:20%">Apex</div>
<div class="bubble" style="top:20%;left:50%">LWC</div>
<div class="bubble" style="top:30%;left:70%">Aura</div>
<div class="bubble" style="top:50%;left:30%">SOQL</div>
<div class="bubble" style="top:70%;left:60%">Batch</div>
<div class="bubble" style="top:40%;left:10%">Queueable</div>
<div class="bubble" style="top:80%;left:40%">REST</div>
<div class="bubble" style="top:60%;left:80%">Flows</div>
</div>
</div>
</div>

<!-- WORK -->
<div class="section">
<div class="box">
<div class="heading">My Work</div>

<div class="work">
<div class="card">LWC</div>
<div class="card">Claims</div>
<div class="card">Automation</div>
</div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<div class="box contact">
<div class="heading">Contact</div>
<div>akshita.tyagi16@gmail.com</div>
<div>+91-9897370632</div>
</div>
</div>

</body>
</html>
