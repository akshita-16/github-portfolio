<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial;
color: white;
overflow-x: hidden;
background: linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
background-size: 400% 400%;
animation: bg 10s ease infinite;
}

/* BACKGROUND ANIMATION */
@keyframes bg {
0% {background-position:0% 50%;}
50% {background-position:100% 50%;}
100% {background-position:0% 50%;}
}

/* SECTION */
.section {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

/* GLASS BOX */
.box {
width: 85%;
height: 80%;
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
transition: 0.5s;
}

/* HEADING */
.heading {
position: absolute;
top: 20px;
font-size: 24px;
letter-spacing: 1px;
}

/* HERO */
.hero {
display: flex;
align-items: center;
gap: 50px;
animation: float 3s ease-in-out infinite;
}

@keyframes float {
0%,100% {transform: translateY(0);}
50% {transform: translateY(-10px);}
}

.avatar {
position: relative;
width: 130px;
height: 130px;
border-radius: 50%;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
}

/* IMAGE */
.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 50%;
position: relative;
z-index: 2;
}

/* GLOWING RING */
.ring {
position: absolute;
width: 150px;
height: 150px;
border-radius: 50%;
background: conic-gradient(
#38bdf8,
#818cf8,
#38bdf8
);
animation: rotate 4s linear infinite;
filter: blur(3px);
z-index: 1;
}

/* INNER DARK LAYER (makes ring look clean) */
.avatar::before {
content: "";
position: absolute;
width: 135px;
height: 135px;
background: #0f172a;
border-radius: 50%;
z-index: 1;
}

/* ROTATION */
@keyframes rotate {
100% {
transform: rotate(360deg);
}
}

/* EXPERIENCE */
.exp-container {
width: 80%;
height: 70%;
position: relative;
}

.line {
position: absolute;
left: 50%;
width: 4px;
height: 100%;
background: #38bdf8;
transform: translateX(-50%);
box-shadow: 0 0 10px #38bdf8;
}

.exp-box {
width: 35%;
padding: 12px;
background: #1e293b;
border-radius: 10px;
position: absolute;
transition: 0.3s;
}

.exp-box:hover {
transform: scale(1.05);
background: #38bdf8;
color: black;
}

.left { left: 0; }
.right { right: 0; }

.e1 { bottom: 0; }
.e2 { bottom: 25%; }
.e3 { bottom: 50%; }
.e4 { bottom: 75%; }

/* SKILLS */
.skills {
width: 100%;
height: 100%;
position: relative;
}

.bubble {
width: 60px;
height: 60px;
background: #1e293b;
border-radius: 50%;
position: absolute;
display: flex;
justify-content: center;
align-items: center;
font-size: 10px;
transition: 0.3s;
}

.skills:hover .bubble {
opacity: 0.4;
}

.bubble:hover {
transform: scale(1.5);
opacity: 1 !important;
background: #38bdf8;
color: black;
}

/* WORK */
.work {
display: flex;
gap: 20px;
}

.card {
width: 120px;
height: 120px;
background: #1e293b;
border-radius: 10px;
display: flex;
justify-content: center;
align-items: center;
transition: 0.3s;
}

.card:hover {
transform: translateY(-10px) scale(1.1);
box-shadow: 0 0 20px #38bdf8;
}

/* CONTACT */
.contact {
text-align: center;
}

/* FADE ANIMATION */
.fade {
opacity: 0;
transform: translateY(40px);
transition: 1s;
}
.fade.show {
opacity: 1;
transform: translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section fade">
<div class="box">
<div class="hero">
<div>Akshita Tyagi</div>
<div class="avatar">
 <div class="ring"></div>
 <img src="profile.png">
</div>
<div>Salesforce Developer</div>
</div>
</div>
</div>

<!-- EXPERIENCE -->
<div class="section fade">
<div class="box">
<div class="heading">My Experience</div>

<div class="exp-container">
<div class="line"></div>

<div class="exp-box left e1">Trainee (2021)</div>
<div class="exp-box right e2">Programmer Analyst (2022)</div>
<div class="exp-box left e3">Associate (2023)</div>
<div class="exp-box right e4">Accenture (2024)</div>

</div>
</div>
</div>

<!-- SKILLS -->
<div class="section fade">
<div class="box">
<div class="heading">My Skills</div>

<div class="skills">
<div class="bubble" style="top:10%;left:20%">Apex</div>
<div class="bubble" style="top:20%;left:50%">LWC</div>
<div class="bubble" style="top:30%;left:70%">Aura</div>
<div class="bubble" style="top:50%;left:30%">SOQL</div>
<div class="bubble" style="top:70%;left:60%">Batch</div>
<div class="bubble" style="top:40%;left:10%">Queue</div>
<div class="bubble" style="top:80%;left:40%">REST</div>
<div class="bubble" style="top:60%;left:80%">Flows</div>
</div>
</div>
</div>

<!-- WORK -->
<div class="section fade">
<div class="box">
<div class="heading">My Work</div>

<div class="work">
<div class="card">LWC</div>
<div class="card">Claims</div>
<div class="card">Automation</div>
</div>
</div>
</div>

<!-- CONTACT -->
<div class="section fade">
<div class="box contact">
<div class="heading">Contact</div>
<div>akshita.tyagi16@gmail.com</div>
<div>+91-9897370632</div>
</div>
</div>

<script>
// FADE IN ON SCROLL
const elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
elements.forEach(el => {
const top = el.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
el.classList.add("show");
}
});
});
</script>

</body>
</html>
