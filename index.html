<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshita Tyagi | Portfolio</title>

<style>
{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',sans-serif;
scroll-behavior:smooth;
overflow-x:hidden;
background:#0f172a;
color:#e2e8f0;
}

/ SCROLL SNAP /
html{scroll-snap-type:y mandatory;}
section{
height:100vh;
scroll-snap-align:start;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:40px;
}

/ HERO /
.hero{
display:flex;
gap:60px;
}
.hero img{
width:260px;
border-radius:50%;
transition:0.2s;
box-shadow:0 0 50px rgba(56,189,248,0.3);
}
.hero-text h1{
font-size:3rem;
background:linear-gradient(90deg,#38bdf8,#818cf8);
-webkit-background-clip:text;
color:transparent;
}
.hero-text h2{
color:#94a3b8;
margin-top:10px;
}

/ TYPING /
.typing::after{
content:"|";
animation:blink 1s infinite;
}
@keyframes blink{
50%{opacity:0;}
}

/ TIMELINE /
.timeline{
position:relative;
width:80%;
}
.timeline::before{
content:"";
position:absolute;
left:50%;
width:2px;
height:100%;
background:#38bdf8;
}
.timeline-item{
width:40%;
padding:20px;
background:#1e293b;
border-radius:12px;
margin:20px 0;
position:relative;
}
.timeline-item.left{left:0;}
.timeline-item.right{left:60%;}
.timeline-item::after{
content:"";
position:absolute;
top:20px;
width:12px;
height:12px;
background:#38bdf8;
border-radius:50%;
}
.left::after{right:-26px;}
.right::after{left:-26px;}

/ SKILLS /
.bubbles{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}
.bubble{
padding:12px 18px;
border-radius:30px;
background:#1e293b;
transition:0.3s;
}
.bubbles:hover .bubble{
opacity:0.4;
transform:scale(0.9);
}
.bubble:hover{
opacity:1!important;
transform:scale(1.4)!important;
background:#38bdf8;
color:black;
}

/ WORK STACK /
.cards{
position:relative;
display:flex;
}
.card{
width:220px;
height:220px;
background:#1e293b;
border-radius:15px;
position:absolute;
transition:0.4s;
padding:15px;
}
.card:nth-child(1){left:0;top:0;}
.card:nth-child(2){left:40px;top:40px;}
.card:nth-child(3){left:80px;top:80px;}

.card:hover{
transform:scale(1.2) translateY(-20px);
z-index:10;
}

/ CONTACT /
.contact{text-align:center;}

/ FADE */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<img id="face" src="https://via.placeholder.com/260">
<div class="hero-text">
<h1>Akshita Tyagi</h1>
<h2 class="typing" id="typing"></h2>
<p>4.9 Years | Accenture</p>
</div>
</section>

<!-- TIMELINE -->
<section>
<div class="timeline fade">
<div class="timeline-item left">Trainee - Cognizant (2021)</div>
<div class="timeline-item right">Programmer Analyst (2022)</div>
<div class="timeline-item left">Associate (2023)</div>
<div class="timeline-item right">Accenture (2024-Present)</div>
</div>
</section>

<!-- SKILLS -->
<section>
<div class="bubbles fade">
<div class="bubble">Apex</div>
<div class="bubble">LWC</div>
<div class="bubble">Aura</div>
<div class="bubble">SOQL</div>
<div class="bubble">Batch</div>
<div class="bubble">Queueable</div>
<div class="bubble">REST API</div>
<div class="bubble">OmniStudio</div>
</div>
</section>

<!-- WORK -->
<section>
<div class="cards fade">
<div class="card">Email LWC System</div>
<div class="card">Claims Platform</div>
<div class="card">Automation Engine</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p>akshita.tyagi16@gmail.com</p>
<p>+91-9897370632</p>
</section>

<script>
// IMAGE FOLLOW
const face=document.getElementById("face");
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*30;
let y=(e.clientY/window.innerHeight-0.5)30;
face.style.transform=translate(${x}px,${y}px);
});

// TYPING EFFECT
const text="A Salesforce Developer who builds scalable systems 🚀";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}
type();

// FADE ON SCROLL
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
const trigger=window.innerHeight0.85;
faders.forEach(el=>{
if(el.getBoundingClientRect().top<trigger){
el.classList.add('show');
}
});
});
</script>

</body>
</html>
