<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshita Tyagi</title>

<style>
{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}
html{scroll-snap-type:y mandatory;}
section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
scroll-snap-align:start;
}

/ HERO BOX /
.hero-box{
border:1px solid rgba(255,255,255,0.2);
padding:40px 60px;
border-radius:20px;
display:flex;
align-items:center;
gap:50px;
backdrop-filter:blur(10px);
}

.hero-box h1{
font-size:2.5rem;
}

.hero-box h2{
color:#38bdf8;
}

/ AVATAR /
.avatar{
width:180px;
height:180px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#818cf8);
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
transition:0.2s;
}

/ TIMELINE /
.timeline-container{
position:relative;
width:80%;
}
.timeline-line{
position:absolute;
left:50%;
height:100%;
border-left:2px dashed #38bdf8;
}

.timeline-item{
width:40%;
padding:15px;
background:#1e293b;
border-radius:10px;
margin:30px 0;
}

.left{margin-right:auto;}
.right{margin-left:auto;}

/ SKILLS /
.skills{
position:relative;
width:100%;
height:100%;
}
.bubble{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
transition:0.3s;
}
.skills:hover .bubble{
opacity:0.4;
}
.bubble:hover{
transform:scale(1.5);
opacity:1!important;
background:#38bdf8;
color:black;
}

/ WORK /
.work-box{
border:1px solid rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
position:relative;
width:400px;
height:400px;
}
.card{
position:absolute;
width:200px;
height:200px;
background:#1e293b;
border-radius:12px;
padding:10px;
transition:0.3s;
}
.card:nth-child(1){top:0;left:0;}
.card:nth-child(2){top:40px;left:40px;}
.card:nth-child(3){top:80px;left:80px;}
.card:hover{
transform:scale(1.2);
z-index:10;
}

/ CONTACT */
.contact{text-align:center;}
</style>
</head>

<body>

<!-- HERO -->
<section>
<div class="hero-box">
<h1>Akshita Tyagi</h1>

<div class="avatar" id="avatar">👩‍💻</div>

<h2>A Salesforce Developer</h2>
</div>
</section>

<!-- TIMELINE -->
<section>
<div class="timeline-container">
<div class="timeline-line"></div>

<div class="timeline-item left">Trainee - Cognizant (2021)</div>
<div class="timeline-item right">Programmer Analyst (2022)</div>
<div class="timeline-item left">Associate (2023)</div>
<div class="timeline-item right">Accenture (2024-Present)</div>

</div>
</section>

<!-- SKILLS -->
<section>
<div class="skills">
<div class="bubble" style="top:10%;left:20%">Apex</div>
<div class="bubble" style="top:30%;left:60%">LWC</div>
<div class="bubble" style="top:70%;left:40%">Aura</div>
<div class="bubble" style="top:50%;left:80%">SOQL</div>
<div class="bubble" style="top:20%;left:75%">Batch</div>
<div class="bubble" style="top:60%;left:15%">Queueable</div>
</div>
</section>

<!-- WORK -->
<section>
<div class="work-box">
<div class="card">LWC System</div>
<div class="card">Claims App</div>
<div class="card">Automation</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p>akshita.tyagi16@gmail.com</p>
<p>+91-9897370632</p>
</section>

<script>
// AVATAR FOLLOW
const avatar=document.getElementById("avatar");
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*20;
let y=(e.clientY/window.innerHeight-0.5)*20;
avatar.style.transform=translate(${x}px,${y}px);
});
</script>

</body>
</html
